name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
            ext: .exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Check installer syntax
        run: bash -n install.sh

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME:-dev}"
          package="sniproxy-${GOOS}-${GOARCH}"
          mkdir -p "dist/${package}/configs" "dist/${package}/deploy"
          go build -trimpath -ldflags "-s -w -X main.buildVersion=${version}" -o "dist/${package}/sniproxy${EXT}" ./cmd/sniproxy
          cp README.md install.sh "dist/${package}/"
          cp configs/sniproxy.example.json "dist/${package}/configs/"
          cp deploy/sniproxy.service "dist/${package}/deploy/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr "${package}.zip" "${package}")
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sniproxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cp install.sh dist/install.sh
          cd dist
          sha256sum *.tar.gz *.zip install.sh > sha256sums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/install.sh
            dist/sha256sums.txt
